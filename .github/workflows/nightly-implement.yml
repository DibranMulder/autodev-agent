name: Nightly Implementation

on:
  schedule:
    # Run at 4 AM UTC every day (2 hours after discovery)
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Specific issue number to implement (optional)'
        required: false
        type: string
      target_repo:
        description: 'Target repository'
        required: false
        type: choice
        options:
          - ''
          - 'privacybydesign/irmago'
          - 'privacybydesign/irmamobile'
          - 'privacybydesign/pbdf-schememanager'

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GH_TOKEN: ${{ secrets.GH_PAT }}

jobs:
  find-approved:
    name: Find Approved Issues
    runs-on: ubuntu-latest
    outputs:
      issues: ${{ steps.find.outputs.issues }}
      has_issues: ${{ steps.find.outputs.has_issues }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Find approved issues
        id: find
        run: |
          if [ -n "${{ inputs.issue_number }}" ]; then
            echo "issues=[{\"repo\": \"${{ inputs.target_repo }}\", \"number\": ${{ inputs.issue_number }}}]" >> $GITHUB_OUTPUT
            echo "has_issues=true" >> $GITHUB_OUTPUT
          else
            python -m autodev.issues.find_approved \
              --repos privacybydesign/irmago,privacybydesign/irmamobile,privacybydesign/pbdf-schememanager \
              --output-format github >> $GITHUB_OUTPUT
          fi

  implement:
    name: Implement Issue
    needs: find-approved
    if: needs.find-approved.outputs.has_issues == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 1  # Implement one at a time to avoid conflicts
      matrix:
        issue: ${{ fromJson(needs.find-approved.outputs.issues) }}

    steps:
      - name: Checkout autodev-agent
        uses: actions/checkout@v4
        with:
          path: autodev-agent

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.issue.repo }}
          path: target-repo
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: autodev-agent/requirements.txt

      - name: Set up Go (for irmago)
        if: contains(matrix.issue.repo, 'irmago')
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Flutter (for irmamobile)
        if: contains(matrix.issue.repo, 'irmamobile')
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Install autodev dependencies
        run: pip install -r autodev-agent/requirements.txt

      - name: Fetch issue details
        id: issue
        run: |
          python autodev-agent/autodev/issues/fetch.py \
            --repo ${{ matrix.issue.repo }} \
            --number ${{ matrix.issue.number }} \
            --output issue.json

      - name: Create implementation branch
        working-directory: target-repo
        run: |
          BRANCH_NAME="autodev/issue-${{ matrix.issue.number }}-$(date +%Y%m%d)"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Implement changes
        id: implement
        run: |
          python autodev-agent/autodev/implement.py \
            --issue issue.json \
            --repo target-repo \
            --config autodev-agent/config/${{ matrix.issue.repo_name }}.yaml \
            --output implementation.json

      - name: Run tests
        id: tests
        working-directory: target-repo
        continue-on-error: true
        run: |
          # Detect repo type and run appropriate tests
          if [ -f "go.mod" ]; then
            go test ./... -v 2>&1 | tee test-results.txt
          elif [ -f "pubspec.yaml" ]; then
            flutter test 2>&1 | tee test-results.txt
          else
            echo "No test framework detected" > test-results.txt
          fi
          echo "test_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Commit changes
        if: steps.tests.outputs.test_exit_code == '0'
        working-directory: target-repo
        run: |
          git config user.name "AutoDev Agent"
          git config user.email "autodev@privacybydesign.foundation"
          git add -A
          git commit -m "$(cat ../implementation.json | jq -r '.commit_message')"
          git push origin "$BRANCH_NAME"

      - name: Create draft PR
        if: steps.tests.outputs.test_exit_code == '0'
        id: pr
        working-directory: target-repo
        run: |
          PR_BODY=$(cat ../implementation.json | jq -r '.pr_body')
          PR_URL=$(gh pr create \
            --title "$(cat ../implementation.json | jq -r '.pr_title')" \
            --body "$PR_BODY" \
            --draft \
            --label "autodev-draft" \
            --head "$BRANCH_NAME")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Link PR to issue
        if: steps.pr.outputs.pr_url != ''
        run: |
          gh issue comment ${{ matrix.issue.number }} \
            --repo ${{ matrix.issue.repo }} \
            --body "Draft PR created: ${{ steps.pr.outputs.pr_url }}"

      - name: Update tracking issue
        if: always()
        run: |
          python autodev-agent/autodev/tracking/update.py \
            --issue ${{ matrix.issue.number }} \
            --repo ${{ matrix.issue.repo }} \
            --status "${{ steps.tests.outputs.test_exit_code == '0' && 'pr_created' || 'tests_failed' }}" \
            --pr-url "${{ steps.pr.outputs.pr_url || '' }}"

      - name: Upload implementation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: implementation-${{ matrix.issue.repo_name }}-${{ matrix.issue.number }}
          path: |
            implementation.json
            target-repo/test-results.txt
          retention-days: 30
