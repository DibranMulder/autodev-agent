name: Nightly Issue Discovery

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no issues created)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  issues: write

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GH_TOKEN: ${{ secrets.GH_PAT }}

jobs:
  discover:
    name: Discover Improvement Opportunities
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch monitored sources
        id: sources
        run: |
          python -m autodev.sources.fetch \
            --config config/sources.yaml \
            --output data/sources.json

      - name: Clone target repositories
        run: |
          mkdir -p repos
          gh repo clone privacybydesign/irmago repos/irmago -- --depth=1
          gh repo clone privacybydesign/irmamobile repos/irmamobile -- --depth=1
          gh repo clone privacybydesign/pbdf-schememanager repos/pbdf-schememanager -- --depth=1

      - name: Analyze repositories
        run: |
          python -m autodev.analyze \
            --repos repos/ \
            --sources data/sources.json \
            --output data/analysis.json

      - name: Generate improvement proposals
        id: proposals
        run: |
          python -m autodev.propose \
            --analysis data/analysis.json \
            --config config/ \
            --output data/proposals.json \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Create GitHub issues
        if: inputs.dry_run != 'true'
        run: |
          python -m autodev.issues.create \
            --proposals data/proposals.json \
            --repos privacybydesign/irmago,privacybydesign/irmamobile,privacybydesign/pbdf-schememanager

      - name: Update tracking issue
        if: inputs.dry_run != 'true'
        run: |
          python -m autodev.tracking.update \
            --proposals data/proposals.json \
            --date $(date +%Y-%m-%d)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: discovery-results-${{ github.run_id }}
          path: data/
          retention-days: 30
