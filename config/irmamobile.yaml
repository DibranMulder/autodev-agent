# Configuration for irmamobile repository
# Focus: EU Age Verification Interoperability

repository:
  name: irmamobile
  owner: privacybydesign
  language: Dart
  test_command: flutter test
  lint_command: flutter analyze

  focus_areas:
    # EU Age Verification Interoperability (HIGHEST PRIORITY)
    - eu.europa.ec.av.1 credential display
    - age_over_18 attribute UI
    - mdoc credential rendering
    - OpenID4VCI issuance flow
    - OpenID4VP presentation consent
    - Single-use attestation tracking
    - Secure Enclave/TEE key storage
    - Biometric/PIN authentication

    # Existing capabilities to leverage
    - SD-JWT credential display
    - OpenID4VP (partial)
    - Document reading (NFC)

  excluded_paths:
    - build/
    - .dart_tool/
    - .git/
    - ios/Pods/
    - android/.gradle/

# EU Age Verification Interoperability Rules
rules:
  credential_display:
    - Display eu.europa.ec.av.1 credentials
    - Show age_over_18 verification status
    - Privacy-preserving UI (no birthdate shown)
    - Credential validity indicator
    - Batch attestation management

  issuance_ui:
    - OpenID4VCI credential offer handling
    - Wallet attestation consent
    - Batch issuance progress
    - Identity verification flow

  presentation_ui:
    - Age verification consent screen
    - Clear "proving over 18" messaging
    - Single-use warning/tracking
    - Verifier trust indicator

  device_security:
    - Secure Enclave key generation (iOS)
    - TEE/Strongbox key generation (Android)
    - Biometric authentication prompt
    - PIN fallback authentication
