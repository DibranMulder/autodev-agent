# Monitored sources for improvement discovery
# PRIMARY FOCUS: Age Verification Interoperability with EU AV Blueprint
#
# ECOSYSTEM CONTEXT:
# - PBDF has own EU AV issuer: go-passport-issuer
# - Issues SD-JWT VC over IRMA protocol (NOT OpenID4VCI)
# - External EU issuers not expected soon
# - Priority: SD-JWT presentation > mdoc > OpenID4VCI

sources:
  # PBDF's own EU Age Verification Issuer (HIGHEST PRIORITY)
  - name: go_passport_issuer
    url: https://github.com/privacybydesign/go-passport-issuer
    type: github
    update_frequency: daily
    priority: 1
    notes: "PBDF's EU AV issuer - issues SD-JWT VC over IRMA protocol"
  # PRIMARY: EU Age Verification Blueprint (HIGHEST PRIORITY)
  - name: ageverification_dev
    url: https://ageverification.dev/
    type: html
    selectors:
      specs: "a[href*='spec'], a[href*='standard'], a[href*='protocol']"
    update_frequency: daily
    priority: 1

  - name: age_verification_architecture
    url: https://ageverification.dev/av-doc-technical-specification/docs/architecture-and-technical-specifications/
    type: html
    update_frequency: daily
    priority: 1

  - name: age_verification_annex_a
    url: https://ageverification.dev/av-doc-technical-specification/docs/architecture-and-technical-specifications/annex-a/
    type: html
    update_frequency: daily
    priority: 1

  # EUDI Wallet Standards
  - name: eudi_wallet_arf
    url: https://eudi.dev/2.8.0/
    type: html
    selectors:
      requirements: "h2, h3"
    update_frequency: daily
    priority: 2

  # Protocol Specifications (for interop)
  - name: openid4vci
    url: https://openid.net/specs/openid-4-verifiable-credential-issuance-1_0.html
    type: html
    update_frequency: daily
    priority: 2

  - name: openid4vp
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
    type: html
    update_frequency: daily
    priority: 2

  # Credential Format Specifications
  - name: mdoc_iso18013
    url: https://www.iso.org/standard/69084.html
    type: html
    update_frequency: weekly
    priority: 2

  - name: sd_jwt_spec
    url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-selective-disclosure-jwt
    type: html
    update_frequency: weekly
    priority: 3

# Categories - Focus on INTEROPERABILITY
# PRIORITIES ADJUSTED for PBDF ecosystem (go-passport-issuer uses SD-JWT + IRMA)
categories:
  - name: sdjwt_age_presentation
    enabled: true
    priority: 1
    max_per_day: 3
    prompt_template: |
      HIGHEST PRIORITY: SD-JWT Age Verification PRESENTATION

      ECOSYSTEM CONTEXT:
      PBDF's go-passport-issuer (https://github.com/privacybydesign/go-passport-issuer)
      already issues SD-JWT VC credentials with age_over_18 over IRMA protocol.

      IMMEDIATE FOCUS:
      1. Presenting SD-JWT age credentials via OpenID4VP
      2. age_over_18 / age_over_X attribute display in wallet UI
      3. Privacy-preserving presentation (show "over 18" not birthdate)
      4. User consent UI specifically for age verification
      5. Integration with go-passport-issuer credentials

      This is the TOP priority - credentials are already being issued!

  - name: credential_type_eu_av
    enabled: true
    priority: 2
    max_per_day: 2
    prompt_template: |
      EU Age Verification credential type (eu.europa.ec.av.1).

      Define the standardized credential type:
      - DocType/vct: eu.europa.ec.av.1
      - Namespace: eu.europa.ec.av.1
      - Required: age_over_18 (boolean)
      - Optional: age_over_NN thresholds
      - Max validity: 3 months

  - name: trust_framework
    enabled: true
    priority: 3
    max_per_day: 2
    prompt_template: |
      Trust framework for EU AV interoperability:
      - ETSI trusted list validation
      - Certificate chain verification
      - Attestation provider validation

  - name: mdoc_format
    enabled: true
    priority: 4
    max_per_day: 1
    prompt_template: |
      mdoc format support (LOWER PRIORITY).

      NOTE: PBDF's issuer uses SD-JWT VC, not mdoc.
      mdoc is for FUTURE interoperability with other EU issuers.
      Only propose if higher-priority items are addressed.

  - name: openid4vci
    enabled: true
    priority: 5
    max_per_day: 1
    prompt_template: |
      OpenID4VCI issuance protocol (LOWEST PRIORITY).

      NOTE: PBDF's go-passport-issuer uses IRMA protocol.
      External EU issuers not expected soon.
      Only propose if other items are addressed.
