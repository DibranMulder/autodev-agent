# Monitored sources for improvement discovery
# PRIMARY FOCUS: Age Verification Interoperability with EU AV Blueprint

sources:
  # PRIMARY: EU Age Verification Blueprint (HIGHEST PRIORITY)
  - name: ageverification_dev
    url: https://ageverification.dev/
    type: html
    selectors:
      specs: "a[href*='spec'], a[href*='standard'], a[href*='protocol']"
    update_frequency: daily
    priority: 1

  - name: age_verification_architecture
    url: https://ageverification.dev/av-doc-technical-specification/docs/architecture-and-technical-specifications/
    type: html
    update_frequency: daily
    priority: 1

  - name: age_verification_annex_a
    url: https://ageverification.dev/av-doc-technical-specification/docs/architecture-and-technical-specifications/annex-a/
    type: html
    update_frequency: daily
    priority: 1

  # EUDI Wallet Standards
  - name: eudi_wallet_arf
    url: https://eudi.dev/2.8.0/
    type: html
    selectors:
      requirements: "h2, h3"
    update_frequency: daily
    priority: 2

  # Protocol Specifications (for interop)
  - name: openid4vci
    url: https://openid.net/specs/openid-4-verifiable-credential-issuance-1_0.html
    type: html
    update_frequency: daily
    priority: 2

  - name: openid4vp
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
    type: html
    update_frequency: daily
    priority: 2

  # Credential Format Specifications
  - name: mdoc_iso18013
    url: https://www.iso.org/standard/69084.html
    type: html
    update_frequency: weekly
    priority: 2

  - name: sd_jwt_spec
    url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-selective-disclosure-jwt
    type: html
    update_frequency: weekly
    priority: 3

# Categories - Focus on INTEROPERABILITY
categories:
  - name: age_verification_interop
    enabled: true
    priority: 1
    max_per_day: 5
    prompt_template: |
      HIGHEST PRIORITY: Age Verification INTEROPERABILITY with EU AV Blueprint.

      The EU Age Verification solution (ageverification.dev) requires:

      1. CREDENTIAL FORMAT (eu.europa.ec.av.1):
         - DocType: eu.europa.ec.av.1
         - Namespace: eu.europa.ec.av.1
         - Required attribute: age_over_18 (boolean)
         - Optional: age_over_NN for other thresholds
         - Format: mdoc (ISO 18013-5) primary, SD-JWT alternative
         - Validity: Max 3 months
         - Batch issuance: 30 attestations recommended

      2. PROTOCOLS:
         - OpenID4VCI for issuance (with wallet attestation)
         - OpenID4VP for presentation
         - Same-device and cross-device flows

      3. TRUST FRAMEWORK:
         - ETSI trusted list validation
         - Trust anchor certificate verification
         - Attestation provider registration check

      4. DEVICE SECURITY:
         - Secure Enclave/TEE key storage
         - User authentication before presentation
         - Single-use attestation tracking

      Check what IRMA/Yivi is MISSING for interoperability.

  - name: protocols
    enabled: true
    priority: 2
    max_per_day: 2
    prompt_template: |
      Protocol gaps for EU AV interoperability:
      - OpenID4VCI with wallet attestation
      - OpenID4VP presentation flows
      - ETSI trusted list fetching

  - name: credential_formats
    enabled: true
    priority: 2
    max_per_day: 2
    prompt_template: |
      Credential format gaps for EU AV interoperability:
      - mdoc with eu.europa.ec.av.1 doctype
      - age_over_18 boolean attribute
      - Batch issuance support
      - 3-month validity enforcement
