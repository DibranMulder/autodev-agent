# Configuration for irmago repository
repository:
  name: irmago
  owner: privacybydesign
  language: Go
  test_command: go test ./...
  lint_command: golangci-lint run

  focus_areas:
    # Age Verification (HIGHEST PRIORITY)
    - Age verification credential issuance
    - age_over_X attribute support (age_over_18, age_over_21)
    - Zero-knowledge age proofs
    - EU Age Verification profile compliance
    - Age verification presentation flows

    # Protocol implementations
    - OpenID4VCI credential issuance
    - OpenID4VP credential presentation
    - SIOPv2 self-issued provider
    - ISO 18013-5 mDL protocol

    # Credential formats
    - SD-JWT selective disclosure
    - mdoc/mDL credentials
    - W3C Verifiable Credentials

  excluded_paths:
    - vendor/
    - testdata/
    - .git/
    - node_modules/

# Specific improvement rules for irmago
rules:
  age_verification:
    - Implement age_over_X derived attributes
    - Add zero-knowledge proof for age verification
    - Support EU Age Verification credential type
    - Implement age verification session type
    - Add age verification specific tests

  protocols:
    - Implement OpenID4VCI for credential issuance (CHECK IF IN PROGRESS)
    - Add OpenID4VP presentation protocol support
    - Implement SIOPv2 for wallet authentication
    - Add ISO 18013-5 device retrieval protocol

  credential_formats:
    - Add SD-JWT credential support
    - Implement mdoc credential parsing and creation
    - Support W3C VC Data Model 2.0

  testing:
    - Age verification flow integration tests
    - Protocol flow integration tests
    - Credential format parsing tests
