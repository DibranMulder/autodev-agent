# Configuration for irmago repository
# Focus: EU Age Verification Interoperability

repository:
  name: irmago
  owner: privacybydesign
  language: Go
  test_command: go test ./...
  lint_command: golangci-lint run

  focus_areas:
    # EU Age Verification Interoperability (HIGHEST PRIORITY)
    - eu.europa.ec.av.1 credential doctype support
    - age_over_18 boolean attribute
    - mdoc credential format (ISO 18013-5)
    - OpenID4VCI with wallet attestation
    - OpenID4VP presentation protocol
    - ETSI trusted list validation
    - Batch issuance (30 attestations)
    - 3-month credential validity enforcement
    - Device key binding (MSO)

    # Existing capabilities to leverage
    - SD-JWT VC credentials
    - OpenID4VP (partial)
    - DCQL queries

  excluded_paths:
    - vendor/
    - testdata/
    - .git/
    - node_modules/

# EU Age Verification Interoperability Rules
rules:
  credential_format:
    - Support mdoc with doctype eu.europa.ec.av.1
    - Support namespace eu.europa.ec.av.1
    - Implement age_over_18 boolean attribute
    - Implement age_over_NN for other thresholds
    - Enforce max 3-month validity period
    - Support batch issuance (30 attestations)
    - NO additional attributes (privacy requirement)

  issuance_protocol:
    - OpenID4VCI pre-authorized code flow
    - Wallet attestation authentication
    - Batch credential endpoint
    - Device key binding via MSO

  presentation_protocol:
    - OpenID4VP same-device flow
    - OpenID4VP cross-device flow (QR)
    - Single-use attestation enforcement
    - User authentication requirement

  trust_framework:
    - ETSI trusted list fetching
    - Certificate chain validation
    - Attestation provider verification
    - Trust anchor management
