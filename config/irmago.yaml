# Configuration for irmago repository
repository:
  name: irmago
  owner: privacybydesign
  language: Go
  test_command: go test ./...
  lint_command: golangci-lint run

  focus_areas:
    - IRMA server implementation
    - Credential issuance and verification
    - Cryptographic operations
    - API endpoints
    - Session management
    - Privacy-preserving attribute disclosure

  excluded_paths:
    - vendor/
    - testdata/
    - .git/
    - node_modules/

# Specific improvement rules for irmago
rules:
  testing:
    - Ensure all public functions have unit tests
    - Add integration tests for API endpoints
    - Test error handling paths
    - Add benchmarks for cryptographic operations

  security:
    - Validate all user inputs
    - Use constant-time comparison for secrets
    - Ensure proper session handling
    - Review cryptographic implementations

  standards:
    - Align with EUDI Wallet ARF requirements
    - Support ISO/IEC 18013-5 mDL standard
    - Implement eIDAS 2.0 trust framework
    - Support SD-JWT credentials

  documentation:
    - Document public APIs
    - Add examples for common use cases
    - Update architecture documentation
